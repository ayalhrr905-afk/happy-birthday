<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد! 🎉</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة تأثير تساقط القصاصات الملونة -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- المشهد الأول: المفاجأة الأولى -->
    <div id="first-scene" class="card">
        <img src="ph1.png" alt="صورة مفاجأة" class="surprise-img">
        <h3>مفكر ممكن ننسى عيد ميلادك؟ 😏</h3>
        <button onclick="startCelebration()">اضغط للمفاجأة!</button>
    </div>

    <!-- المشهد الثاني: الاحتفال الحقيقي (مخفي في البداية) -->
    <div id="second-scene" class="card hidden">
        <div class="cake">🎂</div>
        <h1>كل عام وأنتِ بخير! ✨</h1>
        <h2>Happy Birthday dad :) 🎉</h2>
        <p>بابا حبيبي كل عام وانت بالف خير الله يخليلنا اياك ويعطيك الصحه بنحبك كتير الحمد الله انو انت موجود بحياتنا(: 💖</p>
    </div>

    <!-- ملف الصوت (تأكدي من رفع الأغنية بنفس الاسم تماماً) -->
    <audio id="birthday-audio" src="birthday-audio.mp3" loop></audio>

    <!-- ربط ملف الجافا سكريبت -->
    <script src="script.js"></script>
</body>
</html>
