<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا غالي! 🎉</title>
    <link rel="stylesheet" href="style.css">
    <!-- مكتبة تأثير تساقط القصاصات الملونة القوية -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- حاوية قصاصات الخلفية المستمرة -->
    <div class="confetti-background" id="confetti-bg"></div>

    <!-- المشهد الأول: المفاجأة الأولى -->
    <div id="first-scene" class="card">
        <img src="ph1.png" alt="صورة مفاجأة" class="surprise-img">
        <h3>مفكر ممكن ننسى عيد ميلادك؟ 😏</h3>
        <button onclick="startCelebration()">اضغط للمفاجأة!</button>
    </div>

    <!-- المشهد الثاني: الاحتفال الحقيقي -->
    <div id="second-scene" class="card hidden">
        <div class="cake">🎂</div>
        <h1>كل عام وأنتِ بخير! ✨</h1>
        <h2>Happy Birthday dad 🎉</h2>
        <p>بابا حبيبي كل عام وانت بالف خير الله يخلينا اياك ويعطيك الصحه بنحبك كتير الحمد الله انو انت موجود بحياتنا ❤️</p>
        
        <!-- ⬇️ صندوق الهدية القابل للضغط ⬇️ -->
        <div id="gift-box" class="gift" onclick="openVideoGift()">🎁 <p style="font-size:12px; color:#7f53ac; margin-top:5px;">🎁من ايه !</p></div>
        
        <!-- ⬇️ عنصر الفيديو (مخفي بالبداية) ⬇️ -->
        <div id="video-container" class="hidden">
            <video id="dad-video" controls width="100%" class="video-style">
                <source src="dad-video.mp4" type="video/mp4">
                متصفحك لا يدعم تشغيل الفيديو.
            </video>
        </div>
    </div>

    <!-- ملف الصوت -->
    <audio id="birthday-audio" src="birthday-audio.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
